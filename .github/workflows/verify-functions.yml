name: Verify Edge Function Auth Settings

# Runs after any push to main that touches edge functions.
# Catches JWT misconfiguration before it reaches production.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch: # Allow manual trigger

jobs:
  verify-jwt-settings:
    name: Verify Webhook Function JWT Settings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Deploy changed functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          chmod +x scripts/deploy_functions.sh
          # Deploy only functions that changed in this push
          git diff --name-only HEAD~1 HEAD -- 'supabase/functions/*/index.ts' | \
            sed 's|supabase/functions/||;s|/index.ts||' | \
            while read fn; do
              echo "Deploying changed function: $fn"
              ./scripts/deploy_functions.sh "$fn"
            done

      - name: Verify JWT settings on all webhook functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          ./scripts/deploy_functions.sh --verify-only

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::JWT misconfiguration detected. One or more webhook functions have verify_jwt=true."
          echo "::error::This will cause 401 errors on Telegram, Stripe, or Razorpay webhooks."
          echo "::error::Run: SUPABASE_ACCESS_TOKEN=<token> ./scripts/deploy_functions.sh --fix-jwt"
