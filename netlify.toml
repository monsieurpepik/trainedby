[build]
  publish = "dist"
  command = "pnpm astro build"

[build.environment]
  NODE_VERSION = "22"

# ── Legacy .html URL redirects (301 permanent) ──────────────────────────────
[[redirects]]
  from = "/dashboard.html"
  to = "/dashboard"
  status = 301

[[redirects]]
  from = "/edit.html"
  to = "/edit"
  status = 301

[[redirects]]
  from = "/join.html"
  to = "/join"
  status = 301

[[redirects]]
  from = "/pricing.html"
  to = "/pricing"
  status = 301

[[redirects]]
  from = "/landing.html"
  to = "/landing"
  status = 301

[[redirects]]
  from = "/blog.html"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/plan-builder.html"
  to = "/plan-builder"
  status = 301

[[redirects]]
  from = "/find.html"
  to = "/find"
  status = 301

# ── Academy admin: must come before profile catch-all ───────────────────────
[[redirects]]
  from = "/academy/:slug/admin"
  to = "/academy/admin/index.html"
  status = 200

# ── Academy profile: /academy/:slug → academy index ─────────────────────────
[[redirects]]
  from = "/academy/:slug"
  to = "/academy/index.html"
  status = 200

# ── Catch-all: /:slug → profile page (reads slug from URL at runtime) ───────
[[redirects]]
  from = "/:trainer"
  to = "/profile/index.html"
  status = 200

# ── Security headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.perplexity.ai https://api.openai.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# ── Cache headers ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "image/svg+xml"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
