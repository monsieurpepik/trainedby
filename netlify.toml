[[redirects]]
  from = "/:trainer"
  to = "/index.html"
  status = 200
  conditions = {Role = ["trainer-profile"]}

[[redirects]]
  from = "/:trainer"
  to = "/index.html"
  status = 200

[[edge_functions]]
  function = "og-injector"
  path = "/:trainer"

[[edge_functions]]
  function = "sitemap"
  path = "/sitemap.xml"

[build]
  publish = "."
  command = "npm run build"

[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
